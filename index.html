<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almars.no</title>
    <!-- RETTET: Fulle lenker til Bootstrap og Ikoner -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        :root { --sidebar-width: 260px; --accent: #0d6efd; }
        body { background-color: #f4f7f9; font-family: 'Inter', system-ui, sans-serif; margin: 0; }

        .top-nav { height: 60px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 20px; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .brand { font-weight: 800; font-size: 1.2rem; color: #333; text-decoration: none; }
        .menu-btn { display: none; background: none; border: none; font-size: 1.5rem; margin-right: 15px; }

        .sidebar { width: var(--sidebar-width); background: #fff; border-right: 1px solid #e0e0e0; height: calc(100vh - 60px); position: fixed; top: 60px; left: 0; display: flex; flex-direction: column; transition: 0.3s; z-index: 999; }
        .nav-items { flex: 1; overflow-y: auto; padding: 20px; }
        .nav-group-title { font-size: 0.7rem; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 10px; }
        
        .nav-link-custom { display: flex; align-items: center; padding: 10px 15px; color: #444; text-decoration: none; border-radius: 8px; font-weight: 500; transition: 0.2s; margin-bottom: 2px; }
        .nav-link-custom:hover { background: #f0f4f8; color: var(--accent); }
        .nav-link-custom.active { background: var(--accent); color: #fff; }
        .nav-link-custom i { margin-right: 12px; }

        .sidebar-footer { padding: 20px; border-top: 1px solid #f0f0f0; }
        .legal-link { display: block; font-size: 0.8rem; color: #888; text-decoration: none; padding: 4px 0; }

        main { margin-left: var(--sidebar-width); padding: 90px 30px 30px; }
        .main-card { background: #fff; border-radius: 16px; padding: 30px; border: 1px solid #eef0f2; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .shopify-container { background: #fff; border-radius: 16px; padding: 20px; border: 1px solid #eef0f2; min-height: 500px; }

        @media (max-width: 992px) {
            .menu-btn { display: block; }
            .sidebar { transform: translateX(-100%); }
            body.show-menu .sidebar { transform: translateX(0); }
            main { margin-left: 0; padding: 80px 15px 15px; }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 998; }
            body.show-menu .overlay { display: block; }
        }
    </style>
</head>
<body id="page-body">

    <div class="overlay" onclick="toggleMenu()"></div>

    <nav class="top-nav">
        <button class="menu-btn" onclick="toggleMenu()"><i class="bi bi-list"></i></button>
        <a href="#" class="brand">ALMARS</a>
    </nav>

    <aside class="sidebar">
        <div class="nav-items">
            <a href="#" class="nav-link-custom active"><i class="bi bi-house"></i> Forside</a>
            <div class="nav-group-title">Nettbutikk</div>
            <div id="category-list">
                <script>
                    for(let i=1; i<=15; i++) {
                        document.write(`<a href="#" class="nav-link-custom"><i class="bi bi-tag"></i> Kategori ${i}</a>`);
                    }
                </script>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="nav-group-title" style="margin: 0 0 10px 0;">Informasjon</div>
            <a href="#" class="legal-link">Personvern</a>
            <a href="#" class="legal-link">Angrerett</a>
            <a href="#" class="legal-link">Vilkår for bruk</a>
            <a href="#" class="legal-link">Frakt</a>
            <a href="#" class="legal-link">Kontakt oss</a>
        </div>
    </aside>

    <main>
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="main-card">
                    <h1 class="fw-bold mb-4">Velkommen til Almars.no</h1>
                    <p>Layouten er nå rettet opp med korrekte lenker til bibliotekene.</p>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="shopify-container text-center">
                    <div id='product-component-1775941591790'></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() { document.getElementById('page-body').classList.toggle('show-menu'); }
    </script>

    <!-- RETTET: Fullstendig Shopify SDK Script -->
    <script type="text/javascript">
    (function () {
      var scriptURL = 'https://shopifycdn.com';
      function ShopifyBuyInit() {
        var client = ShopifyBuy.buildClient({
          domain: 'bzj3u1-s6.myshopify.com',
          storefrontAccessToken: '22fd5102cdd15a5e237f985e917cce4c',
        });
        ShopifyBuy.UI.onReady(client).then(function (ui) {
          ui.createComponent('product', {
            id: '8606093672606',
            node: document.getElementById('product-component-1775941591790'),
            moneyFormat: '%7B%7Bamount_with_comma_separator%7D%7D%20kr',
            options: {
              "product": {
                "styles": {
                  "button": { "background-color": "#0d6efd", "border-radius": "8px" }
                },
                "text": { "button": "Kjøp nå" }
              }
            }
          });
        });
      }
      var script = document.createElement('script');
      script.async = true; script.src = scriptURL;
      (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
      script.onload = ShopifyBuyInit;
    })();
    </script>
</body>
</html>
