<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almars.no</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        * { box-sizing: border-box; }
        :root { --header-height: 65px; --sidebar-width: 240px; --primary-blue: #0d6efd; }
        
        body { background-color: #f8f9fa; margin: 0; font-family: 'Inter', sans-serif; min-height: 100vh; }
        
        header.main-header { position: fixed; top: 0; width: 100%; height: var(--header-height); background: #fff; border-bottom: 1px solid #e0e0e0; z-index: 1050; display: flex; align-items: center; padding: 0 20px; }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; margin-right: 15px; }
        .logo-text { font-weight: 800; color: #333; text-decoration: none; }

        nav.sidebar { 
            position: fixed; top: var(--header-height); left: 0; width: var(--sidebar-width); 
            height: calc(100vh - var(--header-height)); background: #fff; border-right: 1px solid #e0e0e0; 
            display: flex; flex-direction: column; z-index: 1040; transition: transform 0.3s ease;
        }
        
        .nav-scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        
        .nav-link { color: #444; padding: 10px; text-decoration: none; display: flex; align-items: center; justify-content: space-between; border-radius: 6px; font-weight: 500; cursor: pointer; }
        .nav-link:hover { background: #f0f4f8; }
        .nav-link.active { background: var(--primary-blue); color: #fff !important; }

        .submenu { list-style: none; padding-left: 20px; display: none; margin-bottom: 10px; }
        .submenu.show { display: block; }
        .submenu-link { color: #666; padding: 5px 10px; text-decoration: none; display: block; font-size: 0.85rem; border-radius: 4px; }

        .legal-links { flex-shrink: 0; border-top: 1px solid #eee; padding: 12px 15px; background: #fff; }
        .legal-links a { display: block; font-size: 0.75rem; color: #777; text-decoration: none; padding: 3px 0; }

        main.content { margin-top: var(--header-height); margin-left: var(--sidebar-width); padding: 25px; }
        
        /* Viktig fix for Shopify-visning */
        .shopify-wrapper { 
            background: #fff; 
            border: 1px solid #eef0f2; 
            border-radius: 12px; 
            padding: 20px; 
            min-height: 550px; /* Sikrer plass til produktet */
            display: block;
            width: 100%;
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            nav.sidebar { transform: translateX(-100%); }
            body.menu-open nav.sidebar { transform: translateX(0); }
            main.content { margin-left: 0; }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1030; }
            body.menu-open .sidebar-overlay { display: block; }
        }
    </style>
</head>
<body id="body">

    <div class="sidebar-overlay" onclick="toggleMenu()"></div>

    <header class="main-header">
        <button class="menu-toggle" onclick="toggleMenu()"><i class="bi bi-list"></i></button>
        <a href="#" class="logo-text">ALMARS</a>
        <h5 class="ms-3 mb-0 d-none d-sm-block fw-bold">Almars.no</h5>
    </header>

    <nav class="sidebar">
        <div class="nav-scroll-area">
            <a class="nav-link active" href="#"><span><i class="bi bi-house-door me-2"></i> Forside</span></a>
            <div class="nav-item">
                <div class="nav-link" onclick="toggleSubmenu()">
                    <span><i class="bi bi-bag me-2"></i> Nettbutikk</span>
                    <i class="bi bi-chevron-down small" id="chevron"></i>
                </div>
                <div class="submenu" id="categoryMenu">
                    <script>
                        for (let i = 1; i <= 15; i++) {
                            document.write(`<a href="#" class="submenu-link">Kategori ${i}</a>`);
                        }
                    </script>
                </div>
            </div>
            <a class="nav-link" href="#"><span><i class="bi bi-newspaper me-2"></i> Nyheter</span></a>
        </div>

        <div class="legal-links">
            <small class="text-muted d-block mb-1 fw-bold" style="font-size: 0.65rem; text-transform: uppercase;">Informasjon</small>
            <a href="#">Personvern</a>
            <a href="#">Angrerett</a>
            <a href="#">Vilkår for bruk</a>
            <a href="#">Frakt</a>
            <a href="#">Kontakt oss</a>
        </div>
    </nav>

    <main class="content">
        <div class="container-fluid">
            <div class="row g-4">
                <div class="col-xl-8">
                    <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
                        <h2 class="fw-bold">Velkommen</h2>
                        <p class="text-muted">Nå skal både menyene og produktet være på plass samtidig.</p>
                    </div>
                </div>
                <div class="col-xl-4">
                    <div class="shopify-wrapper shadow-sm">
                        <!-- ID-en som Shopify-scriptet leter etter -->
                        <div id='product-component-1775938707606'></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() { document.getElementById('body').classList.toggle('menu-open'); }
        function toggleSubmenu() {
            document.getElementById('categoryMenu').classList.toggle('show');
            document.getElementById('chevron').classList.toggle('bi-chevron-up');
        }
    </script>

    <!-- Shopify Script lagt helt til slutt -->
    <script type="text/javascript">
    (function () {
      var scriptURL = 'https://shopifycdn.com';
      function ShopifyBuyInit() {
        var client = ShopifyBuy.buildClient({
          domain: '://myshopify.com',
          storefrontAccessToken: '22fd5102cdd15a5e237f985e917cce4c',
        });
        ShopifyBuy.UI.onReady(client).then(function (ui) {
          ui.createComponent('product', {
            id: '8606093672606',
            node: document.getElementById('product-component-1775938707606'),
            moneyFormat: '%7B%7Bamount_with_comma_separator%7D%7D%20kr',
            options: { "product": { "styles": { "button": { "background-color": "#0d6efd", "border-radius": "8px" } }, "text": { "button": "Kjøp nå" } } }
          });
        });
      }
      if (window.ShopifyBuy) { ShopifyBuyInit(); } 
      else {
        var script = document.createElement('script');
        script.async = true; script.src = scriptURL;
        (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
        script.onload = ShopifyBuyInit;
      }
    })();
    </script>
</body>
</html>
