<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almars.no</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        :root { --sidebar-width: 240px; }
        body { background-color: #f8f9fa; margin: 0; font-family: sans-serif; }
        
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; border-bottom: 1px solid #ddd; z-index: 1000; display: flex; align-items: center; padding: 0 20px; }
        
        nav.sidebar { position: fixed; top: 60px; left: 0; width: var(--sidebar-width); height: calc(100vh - 60px); background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .nav-content { flex: 1; overflow-y: auto; padding: 15px; }
        .nav-link { color: #333; text-decoration: none; display: block; padding: 8px; border-radius: 4px; }
        .nav-link.active { background: #0d6efd; color: #fff; }
        
        .legal-links { padding: 15px; border-top: 1px solid #eee; font-size: 0.8rem; }
        .legal-links a { display: block; color: #777; text-decoration: none; margin-bottom: 5px; }

        main { margin-left: var(--sidebar-width); padding: 80px 20px 20px 20px; }
        .shopify-box { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 20px; min-height: 400px; text-align: center; }

        @media (max-width: 768px) {
            nav.sidebar { display: none; }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>

    <header>
        <strong style="font-size: 1.2rem;">ALMARS</strong>
    </header>

    <nav class="sidebar">
        <div class="nav-content">
            <a href="#" class="nav-link active">Forside</a>
            <div style="padding: 10px 0 5px 10px; font-weight: bold; font-size: 0.9rem;">Nettbutikk</div>
            <div id="cat-list"></div>
            <script>
                const list = document.getElementById('cat-list');
                for(let i=1; i<=15; i++) {
                    list.innerHTML += `<a href="#" style="display:block; padding: 4px 10px; font-size: 0.85rem; color: #666; text-decoration:none;">Kategori ${i}</a>`;
                }
            </script>
        </div>
        <div class="legal-links">
            <a href="#">Personvern</a>
            <a href="#">Angrerett</a>
            <a href="#">Vilkår for bruk</a>
            <a href="#">Frakt</a>
            <a href="#">Kontakt oss</a>
        </div>
    </nav>

    <main>
        <div class="row">
            <div class="col-md-7">
                <div class="card p-4 shadow-sm border-0">
                    <h3>Velkommen</h3>
                    <p>Hvis boksen til høyre er tom, sjekk følgende i Shopify:</p>
                    <ul style="font-size: 0.9rem;">
                        <li>Er produktet satt til <strong>Aktiv (Active)</strong>?</li>
                        <li>Er <strong>Buy Button</strong> valgt som salgskanal for produktet?</li>
                    </ul>
                    <button class="btn btn-sm btn-outline-secondary" onclick="alert('JavaScript fungerer!')">Test nettsiden</button>
                </div>
            </div>
            <div class="col-md-5">
                <div class="shopify-box">
                    <div id='product-component-1775938707606'></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Shopify SDK -->
    <script type="text/javascript">
    (function () {
      var scriptURL = 'https://shopifycdn.com';
      function ShopifyBuyInit() {
        var client = ShopifyBuy.buildClient({
          domain: 'bzj3u1-s6.myshopify.com',
          storefrontAccessToken: '22fd5102cdd15a5e237f985e917cce4c',
        });
        ShopifyBuy.UI.onReady(client).then(function (ui) {
          ui.createComponent('product', {
            id: '8606093672606',
            node: document.getElementById('product-component-1775938707606'),
            moneyFormat: '%7B%7Bamount_with_comma_separator%7D%7D%20kr',
            options: { "product": { "buttonDestination": "checkout", "text": { "button": "Kjøp nå" } } }
          });
        });
      }
      var script = document.createElement('script');
      script.async = true;
      script.src = scriptURL;
      (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
      script.onload = ShopifyBuyInit;
    })();
    </script>
</body>
</html>
