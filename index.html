<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almars.no</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        :root { --sidebar-width: 240px; }
        body { background-color: #f8f9fa; margin: 0; font-family: sans-serif; }
        header { background: #fff; height: 60px; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 20px; position: fixed; width: 100%; top: 0; z-index: 100; }
        
        nav { width: var(--sidebar-width); position: fixed; top: 60px; left: 0; height: calc(100vh - 60px); background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .menu { flex: 1; overflow-y: auto; padding: 15px; }
        .legal { padding: 15px; border-top: 1px solid #eee; }
        .legal a { display: block; color: #777; font-size: 0.8rem; text-decoration: none; margin-bottom: 5px; }
        
        main { margin-left: var(--sidebar-width); padding: 80px 20px 20px; }
        .product-box { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 20px; min-height: 500px; }

        @media (max-width: 768px) {
            nav { display: none; }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>

<header><strong>ALMARS</strong></header>

<nav>
    <div class="menu">
        <strong style="display:block; margin-bottom:10px;">Nettbutikk</strong>
        <div id="cat-placeholder"></div>
        <script>
            for(let i=1; i<=15; i++) {
                document.getElementById('cat-placeholder').innerHTML += `<div style="padding:4px 0; font-size:0.9rem; color:#555;">Kategori ${i}</div>`;
            }
        </script>
    </div>
    <div class="legal">
        <a href="#">Personvern</a>
        <a href="#">Angrerett</a>
        <a href="#">Vilkår for bruk</a>
        <a href="#">Frakt</a>
        <a href="#">Kontakt oss</a>
    </div>
</nav>

<main>
    <div class="row">
        <div class="col-md-8">
            <div style="background:#fff; padding:20px; border:1px solid #eee; border-radius:8px;">
                <h2>Velkommen</h2>
                <p>Nå bruker vi den enkleste koden mulig for å sikre at Shopify-skriptet får "arbeidsro".</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="product-box">
                <!-- Her skal produktet dukke opp -->
                <div id='product-component-1775938707606'></div>
            </div>
        </div>
    </div>
</main>

<script type="text/javascript">
(function () {
  var scriptURL = 'https://shopifycdn.com';
  function ShopifyBuyInit() {
    var client = ShopifyBuy.buildClient({
      domain: '://myshopify.com',
      storefrontAccessToken: '22fd5102cdd15a5e237f985e917cce4c',
    });
    ShopifyBuy.UI.onReady(client).then(function (ui) {
      ui.createComponent('product', {
        id: '8606093672606',
        node: document.getElementById('product-component-1775938707606'),
        moneyFormat: '%7B%7Bamount_with_comma_separator%7D%7D%20kr',
        options: { "product": { "styles": { "button": { "background-color": "#0d6efd" } } } }
      });
    });
  }
  var script = document.createElement('script');
  script.async = true;
  script.src = scriptURL;
  (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
  script.onload = ShopifyBuyInit;
})();
</script>

</body>
</html>
