<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almars.no - Forside</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        :root { --header-height: 65px; --sidebar-width: 240px; --primary-blue: #0d6efd; }
        body { background-color: #f8f9fa; margin: 0; font-family: sans-serif; }
        
        header.main-header { position: fixed; top: 0; width: 100%; height: var(--header-height); background: #fff; border-bottom: 1px solid #e0e0e0; z-index: 1050; display: flex; align-items: center; padding: 0 20px; }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; margin-right: 15px; }

        nav.sidebar { position: fixed; top: var(--header-height); left: 0; width: var(--sidebar-width); height: calc(100vh - var(--header-height)); background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding: 15px; z-index: 1040; transition: transform 0.3s; }
        .nav-link { color: #444; padding: 10px; text-decoration: none; display: block; border-radius: 6px; }
        .nav-link.active { background: var(--primary-blue); color: #fff; }

        main.content { margin-top: var(--header-height); margin-left: var(--sidebar-width); padding: 25px; }

        /* Container for Shopify */
        .shopify-wrapper { background: #fff; border: 1px solid #eef0f2; border-radius: 12px; padding: 20px; min-height: 400px; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            nav.sidebar { transform: translateX(-100%); }
            body.menu-open nav.sidebar { transform: translateX(0); }
            main.content { margin-left: 0; }
        }
    </style>
</head>
<body id="body">

    <header class="main-header">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <div style="font-weight:800;">ALMARS</div>
    </header>

    <nav class="sidebar">
        <div style="flex:1">
            <a class="nav-link active" href="#">Forside</a>
            <a class="nav-link" href="#">Nettbutikk</a>
        </div>
        <div style="border-top: 1px solid #eee; padding-top:10px; font-size: 0.8rem;">
            <a href="#" style="color:#777; text-decoration:none; display:block;">Kontakt</a>
        </div>
    </nav>

    <main class="content">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 border-0 shadow-sm">
                    <h2>Velkommen til Almars</h2>
                    <p>Hvis produktet ikke vises til høyre, sjekk at det er publisert i Shopify.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="shopify-wrapper">
                    <!-- HER SKAL PRODUKTET DUKKE OPP -->
                    <div id='product-component-1775938707606'></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() { document.getElementById('body').classList.toggle('menu-open'); }
    </script>

    <!-- KORRIGERT SHOPIFY SCRIPT -->
    <script type="text/javascript">
    (function () {
      var scriptURL = 'https://shopifycdn.com';
      function ShopifyBuyInit() {
        var client = ShopifyBuy.buildClient({
          domain: '://myshopify.com',
          storefrontAccessToken: '22fd5102cdd15a5e237f985e917cce4c',
        });
        ShopifyBuy.UI.onReady(client).then(function (ui) {
          ui.createComponent('product', {
            id: '8606093672606',
            node: document.getElementById('product-component-1775938707606'),
            moneyFormat: '%7B%7Bamount_with_comma_separator%7D%7D%20kr',
            options: {
              "product": {
                "styles": { "button": { "background-color": "#0d6efd" } },
                "text": { "button": "Kjøp nå" }
              }
            }
          });
        });
      }
      if (window.ShopifyBuy) { ShopifyBuyInit(); } 
      else {
        var script = document.createElement('script');
        script.async = true;
        script.src = scriptURL;
        (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
        script.onload = ShopifyBuyInit;
      }
    })();
    </script>
</body>
</html>
