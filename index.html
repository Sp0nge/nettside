<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almars.no - Forside</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        * { box-sizing: border-box; } /* Viktig for å hindre at padding dytter ting ut */

        :root {
            --header-height: 65px;
            --sidebar-width: 240px;
            --primary-blue: #0d6efd;
        }

        body {
            background-color: #f8f9fa;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            overflow-x: hidden;
        }

        header.main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            z-index: 1050;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .logo-box {
            height: 35px;
            width: 110px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border-radius: 6px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        nav.sidebar {
            position: fixed;
            top: var(--header-height);
            left: 0;
            width: var(--sidebar-width);
            /* Bruker nøyaktig gjenværende høyde */
            height: calc(100vh - var(--header-height)); 
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            z-index: 1040;
        }

        .nav-top {
            flex: 1 1 auto; /* Lar denne delen ta plassen den trenger */
        }

        .nav-column {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-link {
            color: #444;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-link.active {
            background-color: var(--primary-blue);
            color: white !important;
        }

        /* JURIDISK INFO - KOMPRIMERT */
        .legal-links {
            flex-shrink: 0; /* Hindrer at denne delen blir dyttet ut av skjerm */
            border-top: 1px solid #eee;
            padding: 10px 0;
            margin-bottom: 5px; /* Litt luft helt nederst */
        }

        .legal-links a {
            display: block;
            font-size: 0.75rem;
            color: #777;
            text-decoration: none;
            padding: 2px 0;
        }

        main.content {
            margin-top: var(--header-height);
            margin-left: var(--sidebar-width);
            padding: 25px;
        }

        .main-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #eef0f2;
        }

        .shopify-card {
            background: #fff;
            border: 1px solid #0d6efd;
            border-radius: 12px;
            padding: 15px;
        }

        @media (max-width: 768px) {
            nav.sidebar { display: none; }
            main.content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-box">ALMARS</div>
        <h5 class="ms-3 mb-0 fw-bold">Almars.no</h5>
    </header>

    <nav class="sidebar">
        <div class="nav-top">
            <div class="nav-column">
                <a class="nav-link active" href="index.html">Forside</a>
                <a class="nav-link" href="interior.html">Nettbutikk</a>
                <a class="nav-link" href="#">Nyheter</a>
                <a class="nav-link" href="#">Om oss</a>
            </div>
        </div>

        <div class="legal-links">
            <small class="text-muted d-block mb-1 fw-bold" style="font-size: 0.6rem; text-transform: uppercase;">Informasjon</small>
            <a href="#">Personvern</a>
            <a href="#">Angrerett</a>
            <a href="#">Vilkår for bruk</a>
            <a href="#">Frakt</a>
            <a href="#">Kontakt</a>
        </div>
    </nav>

    <main class="content">
        <div class="container-fluid">
            <div class="row g-4">
                <div class="col-xl-8">
                    <div class="main-card">
                        <span class="badge bg-primary px-3 py-2 mb-3">Siste oppdatering</span>
                        <h2 class="fw-bold">Velkommen til Almars</h2>
                        <p class="text-muted">Her bygger vi kildekoden fra bunnen av for full kontroll.</p>
                        <hr>
                        <p>Produktene dukker opp her når de er klare.</p>
                    </div>
                </div>

                <div class="col-xl-4">
                    <div class="shopify-card text-center">
                        <h6 class="text-primary fw-bold mb-3">Mest populær</h6>
                        <div style="height: 150px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;">
                            <span class="text-muted small">Bilde</span>
                        </div>
                        <h5 class="mb-1">Testprodukt</h5>
                        <div class="fw-bold mb-3">599,-</div>
                        <button class="btn btn-primary btn-sm w-100 fw-bold">Kjøp nå</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
